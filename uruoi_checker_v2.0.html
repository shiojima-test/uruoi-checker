<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うるおいチェッカー v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --frame-text:#5a3000;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"M PLUS Rounded 1c",sans-serif;
    background:#0e1518;
    overflow:hidden;
  }

  #stage{position:fixed;inset:0;width:100vw;height:100vh;background:#0e1518;}
  #frameBox{position:absolute;top:0;left:0;width:0;height:0;}
  #bgImg{position:absolute;inset:0;width:100%;height:100%;display:block;
    user-select:none;-webkit-user-drag:none;}

  /* ===== 上部メニュー（普段は閉じて三角だけ） ===== */
  #menuWrap{
    position:fixed;top:0;left:50%;transform:translateX(-50%);
    z-index:30;display:flex;flex-direction:column;align-items:center;
  }
  #menuBar{
    display:flex;align-items:center;gap:10px;
    background:rgba(20,28,32,.82);
    border:1px solid rgba(255,255,255,.18);
    border-top:none;
    border-radius:0 0 14px 14px;
    padding:8px 14px;
    max-height:0;opacity:0;overflow:hidden;
    transition:max-height .25s ease,opacity .2s ease,padding .25s ease;
    padding-top:0;padding-bottom:0;
  }
  #menuBar.open{max-height:60px;opacity:1;padding-top:8px;padding-bottom:8px;}
  .menuBtn{
    font-family:inherit;font-weight:700;
    font-size:14px;color:#fff;
    background:#3AABA8;border:none;border-radius:9px;
    padding:7px 16px;cursor:pointer;white-space:nowrap;
    transition:filter .1s;
  }
  .menuBtn:hover{filter:brightness(1.08);}
  .menuBtn.demo{background:#E88A0A;}
  .menuBtn.demo.on{background:#c0392b;}
  .menuBtn.video{background:#2E8EC4;}
  .menuBtn.video.on{background:#c0392b;}
  .menuBtn.test{background:#6b7b82;}
  .menuBtn.test.on{background:#2d8a3e;}
  /* 三角タブ */
  #menuTab{
    background:rgba(20,28,32,.82);
    border:1px solid rgba(255,255,255,.18);
    border-top:none;
    border-radius:0 0 10px 10px;
    color:#fff;font-size:12px;
    width:46px;height:20px;line-height:18px;text-align:center;
    cursor:pointer;user-select:none;
    transition:filter .1s;
  }
  #menuTab:hover{filter:brightness(1.2);}
  #menuStatus{
    font-size:12px;color:#bcd;white-space:nowrap;
    font-weight:500;padding-left:2px;
  }

  /* ===== オレンジ枠の中のテキスト ===== */
  #panel{
    position:absolute;
    left:5%;right:33%;top:75.5%;bottom:7%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:var(--frame-text);
    padding:0.3% 1%;gap:0.15em;overflow:hidden;
  }
  #question{font-weight:800;font-size:clamp(20px,3.2vw,46px);line-height:1.05;}
  .numRow{display:flex;align-items:baseline;justify-content:center;gap:0.25em;line-height:1;}
  #valueNum{font-weight:900;font-size:clamp(52px,9.5vw,130px);color:#7a3d00;
    font-variant-numeric:tabular-nums;}
  #comment{font-weight:800;font-size:clamp(24px,4vw,58px);line-height:1.05;
    min-height:1.05em;white-space:nowrap;}

  .ver{position:fixed;bottom:8px;right:12px;color:#fff;
    font-family:"M PLUS Rounded 1c",sans-serif;font-weight:700;
    font-size:13px;text-shadow:0 1px 3px rgba(0,0,0,.6);z-index:10;opacity:.85;}

  /* ===== 待機アトラクト動画（全面・縦に切る） ===== */
  #attractOverlay{
    position:fixed;inset:0;z-index:50;
    background:#000;display:none;
    cursor:pointer;
  }
  #attractOverlay.show{display:block;}
  #attractVideo{
    position:absolute;
    top:50%;left:50%;
    /* 横倒し動画を時計回り90°回転して縦画面を埋める。
       回転で幅高さが入れ替わるので、回転前の幅=画面高さ・高さ=画面幅にする */
    width:100vh;
    height:100vw;
    transform:translate(-50%,-50%) rotate(90deg);
    transform-origin:center center;
    object-fit:cover;          /* 縦画面いっぱいに（はみ出す分は切れる） */
    display:block;
  }
  /* テストモード時: 動画も全体表示（切らない）。回転は維持、coverをcontainに */
  body.testmode #attractVideo{ object-fit:contain; }
  #attractHint{
    position:absolute;left:50%;bottom:5%;transform:translateX(-50%);
    color:#fff;font-family:"M PLUS Rounded 1c",sans-serif;font-weight:700;
    font-size:clamp(16px,2.6vw,30px);
    background:rgba(0,0,0,.45);padding:10px 22px;border-radius:30px;
    text-shadow:0 1px 4px rgba(0,0,0,.6);
    pointer-events:none;
    animation:hintPulse 1.8s ease-in-out infinite;
  }
  @keyframes hintPulse{0%,100%{opacity:.6;}50%{opacity:1;}}
</style>
</head>
<body>
  <!-- 上部メニュー -->
  <div id="menuWrap">
    <div id="menuBar">
      <button id="connectBtn" class="menuBtn">せつぞく</button>
      <button id="demoBtn" class="menuBtn demo">デモ</button>
      <button id="videoBtn" class="menuBtn video">動画</button>
      <button id="testBtn" class="menuBtn test">テスト</button>
      <span id="menuStatus">みせつぞく</span>
    </div>
    <div id="menuTab">▼</div>
  </div>

  <div class="ver">v2.0</div>

  <!-- 待機アトラクト動画（全面・縦に切る・無操作で再生／操作で停止） -->
  <div id="attractOverlay">
    <video id="attractVideo" src="festa.mp4" muted loop playsinline preload="auto"></video>
    <div id="attractHint">タッチしてスタート！</div>
  </div>
  <div id="stage">
    <div id="frameBox">
      <img id="bgImg" src="bg_plaza2.png" alt="">
      <div id="panel">
        <div id="question">キミの指、うるおってる？</div>
        <div class="numRow"><span id="valueNum">--</span></div>
        <div id="comment">さあ、センサーにさわってみて！</div>
      </div>
    </div>
  </div>

<script>
/* =========================================================
   うるおいチェッカー v2.0
   - 上部メニュー（普段は三角だけ、押すと せつぞく/デモ が出る）
   - デモ: ランダムに数値が動く（接続なしで動作確認）
   - 実機: 土壌水分センサー(A5) を Web Serial で受信、生値0〜1023
   - 触ると値が「上がる」前提
   ▼ しきい値は現地で実測して調整してください
   ========================================================= */
  const THRESHOLDS = { t1:100, t2:300, t3:500, t4:700 };
  const COMMENTS = {
    idle:"さあ、センサーにさわってみて！",
    low: "ちょっとさらさらかな？",
    mid: "いいかんじ！しっとりしてるね",
    high:"うるうる！みずみずしいね",
    max: "うるおいMAX！すごい！"
  };
  const MAX_RAW = 1023;
  const IMG_W = 1800, IMG_H = 3200;

  const frameBox = document.getElementById('frameBox');
  const valueNum = document.getElementById('valueNum');
  const commentEl = document.getElementById('comment');
  const connectBtn = document.getElementById('connectBtn');
  const demoBtn = document.getElementById('demoBtn');
  const videoBtn = document.getElementById('videoBtn');
  const testBtn = document.getElementById('testBtn');
  const menuBar = document.getElementById('menuBar');
  const menuTab = document.getElementById('menuTab');
  const menuStatus = document.getElementById('menuStatus');

  /* ---- レイアウト（通常=cover画面いっぱい / テスト=contain全体表示・余白黒） ---- */
  let testMode=false;   // layoutより前に宣言（初期化前アクセスを防ぐ）
  function layout(){
    const vw=window.innerWidth, vh=window.innerHeight;
    const useContain = testMode;
    const scale = useContain ? Math.min(vw/IMG_W, vh/IMG_H)
                             : Math.max(vw/IMG_W, vh/IMG_H);
    const w=IMG_W*scale, h=IMG_H*scale;
    frameBox.style.width=w+'px'; frameBox.style.height=h+'px';
    frameBox.style.left=(vw-w)/2+'px'; frameBox.style.top=(vh-h)/2+'px';
  }
  window.addEventListener('resize', layout); layout();

  /* ---- メニュー開閉 ---- */
  let menuOpen=false;
  menuTab.addEventListener('click', ()=>{
    menuOpen=!menuOpen;
    menuBar.classList.toggle('open', menuOpen);
    menuTab.textContent = menuOpen ? '▲' : '▼';
  });

  /* ---- 動画ボタン（手動で動画再生／もう一度で停止） ---- */
  videoBtn.addEventListener('click', ()=>{
    if(attractOn && manualVideo){
      stopAttract();
    }else{
      startAttract(true);   // manual=true: タッチで止まらない、センサーで止まる
      videoBtn.classList.add('on'); videoBtn.textContent='動画停止';
    }
  });

  /* ---- テストボタン（横画面で全体表示。余白は黒） ---- */
  testBtn.addEventListener('click', ()=>{
    testMode=!testMode;
    document.body.classList.toggle('testmode', testMode);
    testBtn.classList.toggle('on', testMode);
    testBtn.textContent = testMode ? 'テスト中' : 'テスト';
    layout();   // 表示方式が変わるので再計算
  });

  /* ---- 値の反映（共通） ---- */
  const buf=[]; const SMOOTH_N=6;
  function applyValue(raw){
    if(raw<0)raw=0; if(raw>MAX_RAW)raw=MAX_RAW;
    raw=Math.round(raw);
    valueNum.textContent=raw;
    buf.push(raw); if(buf.length>SMOOTH_N) buf.shift();
    const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
    let t;
    if(avg<THRESHOLDS.t1) t=COMMENTS.idle;
    else if(avg<THRESHOLDS.t2) t=COMMENTS.low;
    else if(avg<THRESHOLDS.t3) t=COMMENTS.mid;
    else if(avg<THRESHOLDS.t4) t=COMMENTS.high;
    else t=COMMENTS.max;
    if(commentEl.textContent!==t) commentEl.textContent=t;
    // センサー/デモで「触られている」とみなせる値が来たら待機タイマーをリセット
    // （手動動画モード中でもセンサー反応なら止めて体験に戻す）
    if(avg>=THRESHOLDS.t1) noteSensorActivity();
  }
  function resetDisplay(){
    valueNum.textContent='--'; buf.length=0;
    commentEl.textContent=COMMENTS.idle;
  }

  /* ===== 待機アトラクト動画モード ===== */
  // ▼ 無操作が何秒つづいたら動画を出すか（ここを変えるだけで調整可）
  const IDLE_SECONDS = 30;
  const attractOverlay = document.getElementById('attractOverlay');
  const attractVideo = document.getElementById('attractVideo');
  const attractHint = document.getElementById('attractHint');
  let idleTimer = null;
  let attractOn = false;
  let manualVideo = false;   // 「動画」ボタンで出した手動再生か（trueだとタッチで止まらない）

  function startAttract(manual){
    // 既に手動動画モード中なら、自動タイマー(manual=false)が来ても無視（頭出しさせない）
    if(attractOn && manualVideo && !manual) return;
    if(attractOn && manualVideo===!!manual) return;
    attractOn = true;
    manualVideo = !!manual;
    attractOverlay.classList.add('show');
    attractHint.textContent = manual ? 'センサーにさわるとはじまるよ' : 'タッチしてスタート！';
    // 動画再生中は無操作タイマーを止める（途中で頭出し・リセットされないように）
    if(idleTimer){ clearTimeout(idleTimer); idleTimer=null; }
    try{
      // currentTimeはリセットしない＝前回止めた位置から続きを再生（ループは継続）
      attractVideo.muted = true;
      const pr = attractVideo.play();
      if(pr && pr.catch) pr.catch(()=>{});
    }catch(e){ console.log('attract play error', e); }
  }
  function stopAttract(){
    if(!attractOn) return;
    attractOn = false;
    manualVideo = false;
    attractOverlay.classList.remove('show');
    try{ attractVideo.pause(); }catch(_){}
    if(videoBtn){ videoBtn.classList.remove('on'); videoBtn.textContent='動画'; }
    // 通常画面に戻ったので、無操作タイマーを再開
    if(idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(()=>startAttract(false), IDLE_SECONDS*1000);
  }

  // 操作（タッチ/クリック/キー）でのリセット。
  // ・手動動画モード中は何もしない（タッチで止めない・タイマーも触らない）
  // ・自動アトラクト中なら止めて通常へ戻す
  function noteActivity(){
    if(manualVideo) return;                 // 手動動画中は無視
    if(attractOn) stopAttract();            // 自動アトラクト中なら停止（中でタイマー再開）
    else {                                  // 通常画面なら無操作タイマーを張り直す
      if(idleTimer) clearTimeout(idleTimer);
      idleTimer = setTimeout(()=>startAttract(false), IDLE_SECONDS*1000);
    }
  }
  // センサー/デモで実際に値が反応したときに呼ぶ（手動動画も含めて止める）
  function noteSensorActivity(){
    if(attractOn) stopAttract();            // 自動・手動どちらの動画も止める（中でタイマー再開）
    else {
      if(idleTimer) clearTimeout(idleTimer);
      idleTimer = setTimeout(()=>startAttract(false), IDLE_SECONDS*1000);
    }
  }

  ['pointerdown','touchstart','keydown'].forEach(ev=>{
    window.addEventListener(ev, noteActivity, {passive:true});
  });
  // 自動アトラクト動画をタップ→止まる。手動動画モードはタップで止まらない。
  attractOverlay.addEventListener('pointerdown', ()=>{ if(!manualVideo) stopAttract(); });
  // 初期タイマー開始
  noteActivity();

  /* ===== デモモード（ランダム） ===== */
  let demoOn=false, demoTimer=null, demoVal=0, demoTarget=0;
  function startDemo(){
    stopSerial();           // 実機と排他
    demoOn=true;
    demoBtn.classList.add('on'); demoBtn.textContent='デモ停止';
    menuStatus.textContent='デモ中';
    demoVal=0; demoTarget=Math.random()*MAX_RAW;
    demoTimer=setInterval(()=>{
      // ターゲットに少しずつ近づけて、たまに新しいターゲットへ（自然な揺れ）
      if(Math.random()<0.04 || Math.abs(demoVal-demoTarget)<15){
        demoTarget=Math.random()*MAX_RAW;
      }
      demoVal += (demoTarget-demoVal)*0.12 + (Math.random()*20-10);
      applyValue(demoVal);
    },120);
  }
  function stopDemo(){
    demoOn=false;
    if(demoTimer){clearInterval(demoTimer);demoTimer=null;}
    demoBtn.classList.remove('on'); demoBtn.textContent='デモ';
    menuStatus.textContent = serialOn ? 'せつぞく中' : 'みせつぞく';
    if(!serialOn) resetDisplay();
  }
  demoBtn.addEventListener('click', ()=>{ demoOn?stopDemo():startDemo(); });

  /* ===== 実機 Web Serial ===== */
  let port=null, reader=null, serialOn=false, keepReading=false;
  if(!('serial' in navigator)){
    connectBtn.disabled=true;
    connectBtn.textContent='Serial非対応';
    connectBtn.style.background='#888';
  }
  connectBtn.addEventListener('click', connect);

  async function connect(){
    if(demoOn) stopDemo();
    try{
      port=await navigator.serial.requestPort();
      await port.open({baudRate:9600});
      serialOn=true; keepReading=true;
      menuStatus.textContent='せつぞく中';
      buf.length=0;
      readLoop();
    }catch(e){ console.log('接続キャンセル/失敗',e); }
  }
  function stopSerial(){
    keepReading=false;
    if(reader){ try{reader.cancel();}catch(_){ } }
    serialOn=false;
  }
  async function readLoop(){
    const dec=new TextDecoderStream();
    const closed=port.readable.pipeTo(dec.writable).catch(()=>{});
    reader=dec.readable.getReader();
    let s='';
    try{
      while(keepReading){
        const {value,done}=await reader.read();
        if(done) break;
        if(!value) continue;
        s+=value; let i;
        while((i=s.indexOf('\n'))>=0){
          const line=s.slice(0,i).trim(); s=s.slice(i+1);
          if(line==='') continue;
          const raw=parseInt(line,10);
          if(!isNaN(raw) && !demoOn) applyValue(raw);
        }
      }
    }catch(e){ console.log('読取エラー',e); }
    finally{ try{reader.releaseLock();}catch(_){} await closed; }
  }
</script>
</body>
</html>
