<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うるおいチェッカー v1.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --frame-text:#5a3000;   /* オレンジ枠の中の文字色（濃い茶系で読みやすく） */
    --accent:#1f2a30;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"M PLUS Rounded 1c",sans-serif;
    background:#0e1518;
    overflow:hidden;
  }

  /* 画面いっぱいに画像全体を表示（縦横どちらでも全体が見える） */
  #stage{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    background:#0e1518;
  }
  /* 画像の実寸比に合わせた箱。中の文字は画像に対する%で配置するので、
     この箱を画像とぴったり同じ位置・サイズにする。 */
  #frameBox{
    position:absolute;
    /* JSで画像の表示領域に合わせて設定 */
    top:0;left:0;width:0;height:0;
  }
  #bgImg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* ===== オレンジ枠の中だけに置くテキストエリア =====
     画像内の枠の「塗り部分」実測（画像1200x1698基準）:
       縦 上端 約78.4%(y=1332) 〜 下端 約96.6%(y=1641)  ← 高さ約18%の帯
       横 左端 約4% 〜 右端は女の子の頭がかぶるため文字は左寄り
     この狭い帯に収まるよう、要素を詰めて配置する。 */
  #panel{
    position:absolute;
    left:5%;
    right:30%;          /* 右端70%まで（女の子を避ける） */
    top:79.5%;          /* 枠塗り上端78.4%の少し内側 */
    bottom:4.5%;        /* 枠塗り下端96.6%の少し内側=95.5% */
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:var(--frame-text);
    padding:0.3% 1%;
    gap:0.1em;
    overflow:hidden;
  }

  /* 接続前のボタン（枠の中に置く） */
  #connectBtn{
    font-family:inherit;
    font-weight:800;
    font-size:clamp(16px,2.4vw,30px);
    color:#fff;
    background:#E88A0A;
    border:3px solid #fff;
    border-radius:14px;
    padding:0.5em 1.2em;
    cursor:pointer;
    box-shadow:0 4px 0 #b56b06;
    transition:transform .08s,box-shadow .08s;
    line-height:1.2;
  }
  #connectBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #b56b06;}
  #connectGuide{
    font-weight:700;
    font-size:clamp(11px,1.5vw,18px);
    color:var(--frame-text);
    line-height:1.5;
  }

  /* 接続後 */
  #liveArea{display:none;width:100%;height:100%;
    flex-direction:column;align-items:center;justify-content:center;gap:0.05em;}
  #question{
    font-weight:800;
    font-size:clamp(12px,1.7vw,22px);
    line-height:1.05;
  }
  .numRow{
    display:flex;align-items:baseline;justify-content:center;gap:0.25em;
    line-height:1;
  }
  #valueNum{
    font-weight:900;
    font-size:clamp(26px,4.5vw,54px);
    color:#7a3d00;
    font-variant-numeric:tabular-nums;
  }
  .numUnit{font-weight:700;font-size:clamp(10px,1.2vw,16px);color:#8a5520;}
  #comment{
    font-weight:800;
    font-size:clamp(14px,2.1vw,30px);
    line-height:1.1;
    min-height:1.1em;
  }

  #unsupported{display:none;font-weight:700;color:#7a3d00;
    font-size:clamp(12px,1.6vw,18px);line-height:1.5;}

  .ver{position:fixed;top:8px;right:12px;color:#fff;
    font-family:"M PLUS Rounded 1c",sans-serif;font-weight:700;
    font-size:13px;text-shadow:0 1px 3px rgba(0,0,0,.6);z-index:10;}
</style>
</head>
<body>
  <div class="ver">v1.1</div>
  <div id="stage">
    <div id="frameBox">
      <img id="bgImg" src="bg_plaza.png" alt="">
      <!-- オレンジ枠の中だけに表示するパネル -->
      <div id="panel">
        <!-- 接続前 -->
        <div id="connectArea" style="display:flex;flex-direction:column;align-items:center;gap:0.5em;">
          <button id="connectBtn">せつぞくする</button>
          <div id="connectGuide">ボタンをおして、<br>センサーにさわってね</div>
          <div id="unsupported">パソコンの Chrome か Edge でひらいてね</div>
        </div>
        <!-- 接続後 -->
        <div id="liveArea">
          <div id="question">キミの指、しっとりしてる？</div>
          <div class="numRow"><span id="valueNum">--</span><span class="numUnit">／1023</span></div>
          <div id="comment">さあ、センサーにさわってみて！</div>
        </div>
      </div>
    </div>
  </div>

<script>
/* =========================================================
   うるおいチェッカー v1.1
   - 背景: bg_plaza.png（画面いっぱいに全体表示。横でも縦でもOK）
   - 文字はオレンジ枠の中(#panel)だけに表示
   - 土壌水分センサー(A5) を Web Serial で受信、生値0〜1023を表示
   - 触ると値が「上がる」前提
   ▼ しきい値は現地で実測して調整してください
   ========================================================= */
  const THRESHOLDS = { t1:100, t2:300, t3:500, t4:700 };
  const COMMENTS = {
    idle:"さあ、センサーにさわってみて！",
    low: "ちょっとさらさらかな？",
    mid: "いいかんじ！しっとりしてるね",
    high:"うるうる！みずみずしいね",
    max: "うるおいMAX！すごい！"
  };
  const MAX_RAW = 1023;
  const IMG_W = 1200, IMG_H = 1698;   // 背景画像の実寸

  const frameBox = document.getElementById('frameBox');
  const connectBtn = document.getElementById('connectBtn');
  const connectArea = document.getElementById('connectArea');
  const liveArea = document.getElementById('liveArea');
  const valueNum = document.getElementById('valueNum');
  const commentEl = document.getElementById('comment');
  const unsupported = document.getElementById('unsupported');

  // ---- 画像を画面に「全体表示」しつつ、文字を画像基準で正確に重ねる ----
  // frameBox を、画像がcontain表示される実際の矩形に合わせる
  function layout(){
    const vw = window.innerWidth, vh = window.innerHeight;
    const scale = Math.min(vw/IMG_W, vh/IMG_H);
    const w = IMG_W*scale, h = IMG_H*scale;
    frameBox.style.width = w+'px';
    frameBox.style.height = h+'px';
    frameBox.style.left = (vw-w)/2+'px';
    frameBox.style.top  = (vh-h)/2+'px';
  }
  window.addEventListener('resize', layout);
  layout();

  // ---- Web Serial ----
  let port=null, reader=null, keepReading=false;
  const buf=[]; const SMOOTH_N=6;

  if(!('serial' in navigator)){
    connectBtn.style.display='none';
    unsupported.style.display='block';
  }
  connectBtn.addEventListener('click', connect);

  async function connect(){
    try{
      port = await navigator.serial.requestPort();
      await port.open({baudRate:9600});
      connectArea.style.display='none';
      liveArea.style.display='flex';
      keepReading=true;
      readLoop();
    }catch(e){ console.log('接続キャンセル/失敗',e); }
  }

  async function readLoop(){
    const dec=new TextDecoderStream();
    const closed=port.readable.pipeTo(dec.writable).catch(()=>{});
    reader=dec.readable.getReader();
    let s='';
    try{
      while(keepReading){
        const {value,done}=await reader.read();
        if(done) break;
        if(!value) continue;
        s+=value;
        let i;
        while((i=s.indexOf('\n'))>=0){
          const line=s.slice(0,i).trim(); s=s.slice(i+1);
          if(line==='') continue;
          const raw=parseInt(line,10);
          if(!isNaN(raw)) handleValue(raw);
        }
      }
    }catch(e){ console.log('読取エラー',e); }
    finally{ try{reader.releaseLock();}catch(_){} await closed; }
  }

  function handleValue(raw){
    if(raw<0)raw=0; if(raw>MAX_RAW)raw=MAX_RAW;
    valueNum.textContent=raw;
    buf.push(raw); if(buf.length>SMOOTH_N) buf.shift();
    const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
    updateComment(avg);
  }

  function updateComment(v){
    let t;
    if(v<THRESHOLDS.t1) t=COMMENTS.idle;
    else if(v<THRESHOLDS.t2) t=COMMENTS.low;
    else if(v<THRESHOLDS.t3) t=COMMENTS.mid;
    else if(v<THRESHOLDS.t4) t=COMMENTS.high;
    else t=COMMENTS.max;
    if(commentEl.textContent!==t) commentEl.textContent=t;
  }
</script>
</body>
</html>
